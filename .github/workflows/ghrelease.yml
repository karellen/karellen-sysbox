name: karellen-sysbox-copr-release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Release tag to sync from COPR and build images for. Leave empty to
          only rebuild the K8s deploy images at the latest release tag
          (catch up on new CRI-O releases).
        required: false
        default: ''
  push:
    tags:
      - karellen-sysbox-*
  repository_dispatch:
    types:
      - crio-release
# Coalesce image-rebuild storms from karellen-sysbox-crio and manual catch-up
# runs (one running + one queued at most); tag pushes keep their own per-ref
# groups and are unaffected.
concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag == '')) && 'crio-release' || github.ref }}
  cancel-in-progress: false
jobs:
  upload-assets:
    # New karellen-sysbox-crio releases (and manual runs without a tag) only
    # repackage the K8s deploy images; the sysbox release itself is unchanged
    # and the COPR build may no longer exist, so skip the COPR sync.
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    runs-on: ubuntu-24.04
    timeout-minutes: 600
    continue-on-error: false
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: 60
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
      - name: COPR to GitHub Release Action
        uses: karellen/copr-to-gh-release@main
        with:
          copr-owner-name: karellen
          copr-project-name: karellen-sysbox
          copr-package-name: karellen-sysbox
          tag-to-version-regex: '^karellen-sysbox-(\d.+)$'
          tag: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
          clobber-assets: ${{ github.event_name == 'push' }}
          wait-build: true

  build-k8s-images:
    name: build_k8s_image_${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      packages: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm

    needs: [upload-assets]
    if: ${{ !cancelled() && (needs.upload-assets.result == 'success' || needs.upload-assets.result == 'skipped') }}
    timeout-minutes: 600
    continue-on-error: false
    outputs:
      SYSBOX_CE_VER_FULL: ${{ steps.image.outputs.SYSBOX_CE_VER_FULL }}
      SYSBOX_CE_VER_KARELLEN: ${{ steps.image.outputs.SYSBOX_CE_VER_KARELLEN }}
      SYSBOX_DEPLOY_K8S_IMAGE_PATCH: ${{ steps.image.outputs.SYSBOX_DEPLOY_K8S_IMAGE_PATCH }}
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: 60
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          submodules: recursive

      # The image build derives SYSBOX_CE_VER_KARELLEN from the tag at HEAD and
      # downloads the RPM release assets for it, so always build at a release tag.
      # On crio-release dispatches and manual runs HEAD is master, not the tag,
      # so explicitly check out the requested release tag, or the latest one on
      # crio-release dispatches and manual runs without a tag.
      - name: Checkout release tag
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          TAG=""
          case "${{ github.event_name }}" in
            push) TAG="${{ github.ref_name }}" ;;
            workflow_dispatch) TAG="${{ github.event.inputs.tag }}" ;;
          esac

          if [ -z "$TAG" ]; then
              TAG="$(git tag --list 'karellen-sysbox-*' --sort=-creatordate | head -1)"
          fi

          git checkout "$TAG"
          git submodule update --init --recursive

      - name: Start Docker
        run: |
          while ! sudo systemctl start docker; do sudo systemctl status docker || true; sleep 1; done
          while ! docker info; do sleep 1; done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin

      - name: Build K8S Deploy Image
        id: image
        run: |
          ./build.sh

  assemble-images:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    needs: [build-k8s-images]
    timeout-minutes: 600
    continue-on-error: false
    env:
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: 60
      SYSBOX_CE_VER_FULL: ${{ needs.build-k8s-images.outputs.SYSBOX_CE_VER_FULL }}
      SYSBOX_CE_VER_KARELLEN: ${{ needs.build-k8s-images.outputs.SYSBOX_CE_VER_KARELLEN }}
      SYSBOX_DEPLOY_K8S_IMAGE_PATCH: ${{ needs.build-k8s-images.outputs.SYSBOX_DEPLOY_K8S_IMAGE_PATCH }}
    steps:
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin

      - name: Merge images
        run: |
          PLATFORM_TAG="${SYSBOX_CE_VER_FULL}${SYSBOX_DEPLOY_K8S_IMAGE_PATCH}"
          for TAG in "$PLATFORM_TAG" "${SYSBOX_CE_VER_KARELLEN}${SYSBOX_DEPLOY_K8S_IMAGE_PATCH}" latest; do
              docker manifest create ghcr.io/karellen/sysbox-deploy-k8s:$TAG \
                    --amend ghcr.io/karellen/sysbox-deploy-k8s:v${PLATFORM_TAG}-amd64 \
                    --amend ghcr.io/karellen/sysbox-deploy-k8s:v${PLATFORM_TAG}-arm64
              docker manifest push ghcr.io/karellen/sysbox-deploy-k8s:$TAG
          done

